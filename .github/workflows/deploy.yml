name: Deploy to GitHub Pages

# This repo is the SECONDARY (Lovable) property, not the canonical
# growmaticsa.com site — that is the hand-built `growmatic-sa` repo, which
# owns the domain and auto-deploys on every push. To stop this build from
# re-competing for the domain, automatic deploys on push are disabled here:
# it now only publishes when run manually (Actions tab -> this workflow ->
# "Run workflow"), for deliberate experimentation. Also remove the custom
# domain for this repo under Settings -> Pages so it never serves at
# growmaticsa.com. See CLAUDE.md.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
